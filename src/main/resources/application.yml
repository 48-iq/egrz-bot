spring:
  application:
    name: egrz-bot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
  
bot:
  username: ${BOT_USERNAME}
  token: ${BOT_TOKEN}
  threadPoolSize: ${BOT_THREAD_POOL_SIZE:10}
  apiUri: ${BOT_API_URI:https://open-api.egrz.ru/api}
  adminChatId: ${BOT_ADMIN_CHAT_ID}
  cron: ${BOT_CRON:0 0 5 * * ?}